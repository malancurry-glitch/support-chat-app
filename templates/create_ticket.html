<!DOCTYPE html>
<html>
<head>
<title>Submit a Request</title>

<style>
:root { --primary:#2563eb; }

body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f3f4f6;
}

.header { text-align:center; padding:30px; }
.logo { height:50px; }

.container {
    max-width:650px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.step { display:none; }
.active { display:block; }

.input-group { margin-bottom:20px; }

input, textarea, select {
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

.counter {
    font-size:12px;
    text-align:right;
    color:#666;
}

.file-box {
    border:2px dashed #ccc;
    padding:20px;
    text-align:center;
    border-radius:10px;
    cursor:pointer;
}

.file-box.drag {
    border-color:var(--primary);
    background:#eef4ff;
}

.btn {
    padding:12px;
    border:none;
    border-radius:8px;
    background:var(--primary);
    color:white;
    cursor:pointer;
    width:100%;
}

.btn.secondary { background:#ccc; }

.btn:disabled {
    background:#9ca3af;
    cursor:not-allowed;
}

.summary {
    background:#f9fafb;
    padding:15px;
    border-radius:10px;
}

.loading {
    text-align:center;
    margin-top:10px;
    display:none;
}

/* 🔥 ADDED SUCCESS STYLE */
.success-box {
    display:none;
    text-align:center;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="header">
    <img src="/static/logo.png" class="logo">
</div>

<div class="container">

<!-- STEP 1 -->
<div id="step1" class="step active">
<h3>Create Ticket</h3>

<div class="input-group">
<input id="name" placeholder="Full Name" required>
</div>

<div class="input-group">
<input id="email" placeholder="Email" required>
</div>

<button class="btn" onclick="validateStep1()">Next</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="step">
<h3>Issue Details</h3>

<div class="input-group">
<select id="issueType" onchange="autoFill()">
<option value="">-- Select Issue --</option>
<option>Withdrawal</option>
<option>Deposit</option>
<option>SMS not received</option>
<option>Email not received</option>
<option>Code not received</option>
<option>Change of address</option>
<option>Change of email address</option>
<option>Change of phone number</option>
<option>Change of name</option>
</select>
</div>

<div class="input-group">
<input id="subject" placeholder="Subject">
</div>

<div class="input-group">
<textarea id="message" oninput="countChars()" placeholder="Describe your issue"></textarea>
<div class="counter" id="counter">0/500</div>
</div>

<button class="btn secondary" onclick="nextStep(1)">Back</button>
<button class="btn" onclick="validateStep2()">Next</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="step">
<h3>Attachments</h3>

<div id="dropZone" class="file-box">
<input type="file" id="fileInput" hidden>
<p>Drop file or click</p>
<div id="fileName"></div>
</div>

<button class="btn secondary" onclick="nextStep(2)">Back</button>
<button class="btn" onclick="showSummary()">Next</button>
</div>

<!-- STEP 4 -->
<div id="step4" class="step">
<h3>Review</h3>

<div class="summary">
<p><b>Name:</b> <span id="sumName"></span></p>
<p><b>Email:</b> <span id="sumEmail"></span></p>
<p><b>Issue:</b> <span id="sumIssue"></span></p>
<p><b>Subject:</b> <span id="sumSubject"></span></p>
<p><b>Message:</b> <span id="sumMessage"></span></p>
</div>

<button class="btn secondary" onclick="nextStep(3)">Back</button>
<button class="btn" id="submitBtn" onclick="submitTicket()">Submit</button>

<div class="loading" id="loading">Submitting...</div>
</div>

<!-- 🔥 ADDED SUCCESS UI -->
<div id="successBox" class="success-box">
<h2>✅ Ticket Created</h2>
<p>Your Ticket ID:</p>
<h3 id="ticketId"></h3>
<p id="countdownText"></p>
</div>

<p style="text-align:center;margin-top:20px;">
<a href="/my-tickets" style="color:#2563eb;text-decoration:none;font-weight:500;">
View My Tickets
</a>
</p>

</div>

<script>
// ELEMENTS
let nameEl = document.getElementById("name");
let emailEl = document.getElementById("email");
let subjectEl = document.getElementById("subject");
let messageEl = document.getElementById("message");
let issueTypeEl = document.getElementById("issueType");

let createdTicketId = null;

// STEP NAV
function nextStep(n){
    document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
    document.getElementById("step"+n).classList.add("active");
}

// VALIDATION
function validateStep1(){
    if(!nameEl.value || !emailEl.value){
        alert("Please fill name and email");
        return;
    }
    nextStep(2);
}

function validateStep2(){
    if(!subjectEl.value || !messageEl.value){
        alert("Please fill subject and message");
        return;
    }
    nextStep(3);
}

// COUNT
function countChars(){
    document.getElementById("counter").innerText = messageEl.value.length + "/500";
}

// AUTO FILL
function autoFill(){
    let issue = issueTypeEl.value;
    if(!issue) return;

    subjectEl.value = issue + " Issue";
    messageEl.value = `Hello,\n\nI am experiencing an issue with: ${issue}.\n\nDetails:\n`;
    countChars();
}

// SUMMARY
function showSummary(){
    document.getElementById("sumName").innerText = nameEl.value;
    document.getElementById("sumEmail").innerText = emailEl.value;
    document.getElementById("sumIssue").innerText = issueTypeEl.value;
    document.getElementById("sumSubject").innerText = subjectEl.value;
    document.getElementById("sumMessage").innerText = messageEl.value;
    nextStep(4);
}

// SAVE EMAIL
function saveUser(){
    localStorage.setItem("user_email", emailEl.value);
}

// 🔥 UPDATED SUBMIT (ONLY ADDITION)
async function submitTicket(){
    let btn = document.getElementById("submitBtn");
    let loading = document.getElementById("loading");

    btn.disabled = true;
    loading.style.display = "block";

    saveUser();

    let formData = new FormData();
    formData.append("name", nameEl.value);
    formData.append("email", emailEl.value);
    formData.append("subject", subjectEl.value);
    formData.append("message", messageEl.value);

    if(fileInput.files[0]){
        formData.append("file", fileInput.files[0]);
    }

    try{
        let res = await fetch("/", { method:"POST", body:formData });

        if(res.redirected){
            let id = res.url.split("/").pop();
            createdTicketId = id;

            // 🔥 hide form
            document.querySelectorAll(".step").forEach(s=>s.style.display="none");

            // 🔥 show success
            document.getElementById("successBox").style.display = "block";
            document.getElementById("ticketId").innerText = "#" + id;

            // 🔥 countdown
            let time = 10;
            let txt = document.getElementById("countdownText");

            let interval = setInterval(()=>{
                txt.innerText = "Opening chat in " + time + " seconds...";
                time--;

                if(time < 0){
                    clearInterval(interval);
                    window.location.href = "/ticket/" + id;
                }
            },1000);

        } else {
            alert("Error submitting ticket");
        }

    }catch(e){
        alert("Network error");
    }

    btn.disabled = false;
    loading.style.display = "none";
}

// FILE
let dropZone = document.getElementById("dropZone");
let fileInput = document.getElementById("fileInput");
let fileName = document.getElementById("fileName");

dropZone.onclick = () => fileInput.click();

fileInput.onchange = () => {
    if(fileInput.files[0]){
        fileName.innerText = fileInput.files[0].name;
    }
};

dropZone.addEventListener("dragover", e=>{
    e.preventDefault();
    dropZone.classList.add("drag");
});

dropZone.addEventListener("drop", e=>{
    e.preventDefault();
    fileInput.files = e.dataTransfer.files;
    fileName.innerText = fileInput.files[0].name;
});

// AUTO EMAIL
window.onload = () => {
    let saved = localStorage.getItem("user_email");
    if(saved){
        emailEl.value = saved;
    }
};
</script>

</body>
</html>
