<!DOCTYPE html>
<html>
<head>
<title>Submit a Request</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root { --primary:#2563eb; }

body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f3f4f6;
}

.header { text-align:center; padding:20px; }
.logo { height:45px; }

.container {
    max-width:650px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.step { display:none; }
.active { display:block; }

.input-group { margin-bottom:20px; }

input, textarea, select {
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

.counter {
    font-size:12px;
    text-align:right;
}

.file-box {
    border:2px dashed #ccc;
    padding:20px;
    text-align:center;
    border-radius:10px;
    cursor:pointer;
}

.preview img, .preview video {
    max-width:100%;
    margin-top:10px;
    border-radius:10px;
}

.btn {
    padding:12px;
    border:none;
    border-radius:8px;
    background:var(--primary);
    color:white;
    width:100%;
}

.btn.secondary { background:#ccc; }

.loading {
    text-align:center;
    display:none;
}

.success-box {
    display:none;
    text-align:center;
}
</style>
</head>

<body>

<div class="header">
<img src="/static/logo.png" class="logo">
</div>

<div class="container">

<!-- STEP 1 -->
<div id="step1" class="step active">
<h3>Create Ticket</h3>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">

<button class="btn" onclick="validateStep1()">Next</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="step">
<h3>Issue Details</h3>

<select id="issueType" onchange="autoFill()">
<option value="">Select Issue</option>
<option>Withdrawal</option>
<option>Deposit</option>
</select>

<input id="subject" placeholder="Subject">

<textarea id="message" oninput="countChars()" placeholder="Describe your issue"></textarea>
<div class="counter" id="counter">0/500</div>

<button class="btn secondary" onclick="nextStep(1)">Back</button>
<button class="btn" onclick="validateStep2()">Next</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="step">
<h3>Attachments</h3>

<div id="dropZone" class="file-box">
<input type="file" id="fileInput" hidden>
<p>Click or drop file</p>
<div id="fileName"></div>
<div class="preview" id="preview"></div>
</div>

<button class="btn secondary" onclick="nextStep(2)">Back</button>
<button class="btn" onclick="showSummary()">Next</button>
</div>

<!-- STEP 4 -->
<div id="step4" class="step">
<h3>Review</h3>

<p><b>Name:</b> <span id="sumName"></span></p>
<p><b>Email:</b> <span id="sumEmail"></span></p>
<p><b>Subject:</b> <span id="sumSubject"></span></p>
<p><b>Message:</b> <span id="sumMessage"></span></p>

<button class="btn secondary" onclick="nextStep(3)">Back</button>
<button class="btn" id="submitBtn" onclick="submitTicket()">Submit</button>

<div class="loading" id="loading">Submitting...</div>
</div>

<!-- SUCCESS -->
<div id="successBox" class="success-box">
<h2>✅ Ticket Created</h2>
<p>Your Ticket ID:</p>
<h3 id="ticketId"></h3>
<p id="autoText"></p>
<a href="/my-tickets">View My Tickets</a>
</div>

</div>

<script>
let nameEl = document.getElementById("name");
let emailEl = document.getElementById("email");
let subjectEl = document.getElementById("subject");
let messageEl = document.getElementById("message");

let createdTicketId = null;

// STEP
function nextStep(n){
    document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
    document.getElementById("step"+n).classList.add("active");
}

// VALIDATE
function validateStep1(){
    if(!nameEl.value || !emailEl.value){
        alert("Fill all fields");
        return;
    }
    nextStep(2);
}

function validateStep2(){
    if(!subjectEl.value || !messageEl.value){
        alert("Fill all fields");
        return;
    }
    nextStep(3);
}

// COUNT
function countChars(){
    counter.innerText = messageEl.value.length + "/500";
}

// AUTO
function autoFill(){
    subjectEl.value = issueType.value + " Issue";
}

// SUMMARY
function showSummary(){
    sumName.innerText = nameEl.value;
    sumEmail.innerText = emailEl.value;
    sumSubject.innerText = subjectEl.value;
    sumMessage.innerText = messageEl.value;
    nextStep(4);
}

// 🔥 FIXED SUBMIT (REAL FIX)
async function submitTicket(){
    let btn = document.getElementById("submitBtn");
    let loading = document.getElementById("loading");

    btn.disabled = true;
    loading.style.display = "block";

    let formData = new FormData();
    formData.append("name", nameEl.value);
    formData.append("email", emailEl.value);
    formData.append("subject", subjectEl.value);
    formData.append("message", messageEl.value);

    if(fileInput.files[0]){
        formData.append("file", fileInput.files[0]);
    }

    try{
        let res = await fetch("/", {
            method:"POST",
            body:formData,
            redirect:"manual"
        });

        let location = res.headers.get("Location");

        if(location){
            createdTicketId = location.split("/").pop();

            document.querySelectorAll(".step").forEach(s=>s.style.display="none");
            document.getElementById("successBox").style.display = "block";

            document.getElementById("ticketId").innerText = "#" + createdTicketId;

            showDelivered();
            enableNotifications();
            startAutoOpen();
        } else {
            alert("Error submitting ticket");
        }

    }catch(e){
        alert("Network error");
    }

    btn.disabled = false;
    loading.style.display = "none";
}

// 🔥 AUTO OPEN
function startAutoOpen(){
    let time = 10;
    let el = document.getElementById("autoText");

    let i = setInterval(()=>{
        el.innerText = "Opening chat in " + time + "s...";
        time--;

        if(time < 0){
            clearInterval(i);
            window.location.href = "/ticket/" + createdTicketId;
        }
    },1000);
}

// 🔥 DELIVERY CHECK
function showDelivered(){
    let el = document.createElement("div");
    el.innerText = "✓ Delivered";
    el.style.fontSize = "12px";
    el.style.color = "green";
    document.getElementById("successBox").appendChild(el);
}

// 🔥 NOTIFICATION
function enableNotifications(){
    if ("Notification" in window){
        Notification.requestPermission();
    }
}

// FILE
let dropZone = document.getElementById("dropZone");
let fileInput = document.getElementById("fileInput");
let fileName = document.getElementById("fileName");
let preview = document.getElementById("preview");

dropZone.onclick = ()=>fileInput.click();

fileInput.onchange = ()=>{
    let file = fileInput.files[0];
    if(!file) return;

    fileName.innerText = file.name;
    preview.innerHTML = "";

    if(file.type.startsWith("image")){
        let img = document.createElement("img");
        img.src = URL.createObjectURL(file);
        preview.appendChild(img);
    }
    else if(file.type.startsWith("video")){
        let vid = document.createElement("video");
        vid.src = URL.createObjectURL(file);
        vid.controls = true;
        preview.appendChild(vid);
    }
};

// AUTO EMAIL
window.onload = () => {
    let saved = localStorage.getItem("user_email");
    if(saved){
        emailEl.value = saved;
    }
};
</script>

</body>
</html>
