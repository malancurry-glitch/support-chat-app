<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

<style>
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    height:100vh;
    background:#f3f4f6;
}

.nav {
    width:70px;
    background:#111827;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
}

.sidebar {
    width:320px;
    background:#1f2937;
    color:white;
    display:flex;
    flex-direction:column;
}

.search { padding:10px; }
.search input {
    width:100%;
    padding:8px;
    border-radius:6px;
    border:none;
}

.ticket-list { overflow-y:auto; flex:1; }

.ticket {
    padding:12px;
    border-bottom:1px solid #374151;
    cursor:pointer;
    position:relative;
}

.ticket:hover { background:#374151; }
.active-ticket { background:#2563eb; }

.unread {
    position:absolute;
    right:10px;
    top:10px;
    background:red;
    color:white;
    font-size:10px;
    padding:2px 6px;
    border-radius:10px;
}

.main {
    flex:1;
    display:flex;
    flex-direction:column;
}

.header {
    padding:15px;
    background:white;
    border-bottom:1px solid #ddd;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.top-bar {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.analytics {
    display:flex;
    gap:15px;
    font-size:13px;
}

.analytics div {
    background:#eef2ff;
    padding:6px 10px;
    border-radius:8px;
}

.controls {
    display:flex;
    gap:8px;
}

button {
    cursor:pointer;
    padding:6px 10px;
    border:none;
    border-radius:6px;
}

.close { background:#ef4444; color:white; }
.open { background:#22c55e; color:white; }
.upload { background:#2563eb; color:white; }
.delete { background:#111827; color:white; }
.assign { background:#9333ea; color:white; }
.ai { background:#f59e0b; color:white; }

.messages {
    flex:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.bubble {
    max-width:65%;
    padding:12px;
    margin:6px 0;
    border-radius:10px;
}

.user { background:#e0f2fe; }
.admin { background:#dcfce7; align-self:flex-end; }

.bubble img, .bubble video {
    max-width:250px;
    border-radius:8px;
}

.input-box {
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
}

input {
    flex:1;
    padding:10px;
}
</style>
</head>

<body>

<div class="nav">💬</div>

<div class="sidebar">

<div class="search">
<input id="search" placeholder="Search..." oninput="filterTickets()">
</div>

<div id="ticketList" class="ticket-list">
{% for t in tickets %}
<div class="ticket" data-id="{{t[0]}}">
<b>{{t[2]}}</b><br>
<small>{{t[1]}}</small><br>
<small>Status: {{t[4]}}</small>
</div>
{% endfor %}
</div>

</div>

<div class="main">

<div class="header">

<div class="top-bar">
<div id="ticketTitle">Select a ticket</div>

<div class="controls">
<button class="assign" onclick="assignAgent()">Assign</button>
<button class="ai" onclick="aiReply()">AI</button>
<button class="open" onclick="openTicket()">Open</button>
<button class="close" onclick="closeTicket()">Close</button>
<button class="delete" onclick="deleteTicket()">Delete</button>
<button class="upload" onclick="uploadFile()">📎</button>
<input type="file" id="fileInput" hidden>
</div>
</div>

<div class="analytics">
<div id="totalTickets">Total: 0</div>
<div id="openTickets">Open: 0</div>
<div id="closedTickets">Closed: 0</div>
</div>

</div>

<div id="messages" class="messages"></div>

<div class="input-box">
<input id="messageInput" placeholder="Reply..." onkeypress="handleKey(event)">
<button onclick="sendReply()">Send</button>
</div>

</div>

<script>
let socket = io();
let currentTicket = null;
let currentStatus = "open";

const messagesEl = document.getElementById("messages");
const titleEl = document.getElementById("ticketTitle");
const inputEl = document.getElementById("messageInput");
const fileInput = document.getElementById("fileInput");

// 📊 ANALYTICS FIX
function updateAnalytics(){
    let tickets = document.querySelectorAll(".ticket");
    let open = 0, closed = 0;

    tickets.forEach(t=>{
        let txt = t.innerText.toLowerCase();
        if(txt.includes("closed")) closed++;
        else open++;
    });

    totalTickets.innerText="Total: "+tickets.length;
    openTickets.innerText="Open: "+open;
    closedTickets.innerText="Closed: "+closed;
}
updateAnalytics();

// LOAD
document.querySelectorAll(".ticket").forEach(el=>{
    el.onclick=()=>loadTicket(el.dataset.id, el);
});

function loadTicket(id, el){
    currentTicket=id;

    socket.emit("join_ticket",{ticket_id:id});

    document.querySelectorAll(".ticket").forEach(t=>t.classList.remove("active-ticket"));
    el.classList.add("active-ticket");

    currentStatus = el.innerText.includes("closed") ? "closed":"open";

    titleEl.innerText="Ticket: "+id+" ("+currentStatus+")";

    fetch(`/api/history/${id}`)
    .then(res=>res.json())
    .then(data=>{
        messagesEl.innerHTML="";
        data.forEach(m=>addMessage(m.message,m.sender,m.time));
    });
}

// 🔥 FIXED MEDIA SUPPORT
function addMessage(msg,sender,time=""){
    let div=document.createElement("div");
    div.className="bubble "+sender;

    if(msg.startsWith("[FILE]")){
        let file=msg.replace("[FILE] ","");
        let url="/uploads/"+file;
        let ext=file.split('.').pop().toLowerCase();

        if(["jpg","jpeg","png","gif","webp"].includes(ext)){
            div.innerHTML=`<img src="${url}">`;
        }
        else if(["mp4","webm","ogg"].includes(ext)){
            div.innerHTML=`<video controls><source src="${url}"></video>`;
        }
        else{
            div.innerHTML=`<a href="${url}" target="_blank">📎 ${file}</a>`;
        }

        div.innerHTML += `<br><a href="/download/${file}">⬇ Download</a>`;
    } else {
        div.innerText=msg;
    }

    div.innerHTML+=`<div style="font-size:10px">${time}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

// SEND
function sendReply(){
    if(currentStatus==="closed") return alert("Ticket closed");

    let msg=inputEl.value.trim();
    if(!msg) return;

    socket.emit('send_message',{
        ticket_id:currentTicket,
        sender:'admin',
        message:msg
    });

    addMessage(msg,"admin");
    inputEl.value="";
}

// FILE
function uploadFile(){
    if(!currentTicket) return alert("Select ticket first");
    fileInput.click();
}

fileInput.onchange=()=>{
    let file=fileInput.files[0];
    if(!file) return;

    let form=new FormData();
    form.append("file",file);

    fetch(`/upload/${currentTicket}`,{method:"POST",body:form})
    .then(()=>addMessage("[FILE] "+file.name,"admin"));
};

// ACTIONS
function closeTicket(){
    fetch(`/close/${currentTicket}`).then(()=>location.reload());
}

function openTicket(){
    fetch(`/open/${currentTicket}`).then(()=>location.reload());
}

function deleteTicket(){
    if(confirm("Delete ticket?")){
        fetch(`/delete/${currentTicket}`).then(()=>location.reload());
    }
}

function assignAgent(){
    let name=prompt("Assign agent:");
    if(!name) return;

    fetch(`/assign/${currentTicket}`,{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({agent:name})
    });
}

function aiReply(){
    fetch(`/ai/${currentTicket}`)
    .then(res=>res.json())
    .then(d=>inputEl.value=d.reply);
}

function filterTickets(){
    let q=document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".ticket").forEach(t=>{
        t.style.display=t.innerText.toLowerCase().includes(q)?"block":"none";
    });
}

// REALTIME
socket.on('new_message',data=>{
    if(String(data.ticket_id)===String(currentTicket)){
        addMessage(data.message,data.sender,data.time);
    }
});

function handleKey(e){
    if(e.key==="Enter") sendReply();
}
</script>

</body>
</html>
