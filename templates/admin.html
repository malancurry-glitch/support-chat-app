<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

<style>
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    height:100vh;
    background:#f3f4f6;
}

.nav {
    width:70px;
    background:#111827;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
}

.sidebar {
    width:320px;
    background:#1f2937;
    color:white;
    display:flex;
    flex-direction:column;
}

.search { padding:10px; }
.search input {
    width:100%;
    padding:8px;
    border-radius:6px;
    border:none;
}

.ticket-list { overflow-y:auto; flex:1; }

.ticket {
    padding:12px;
    border-bottom:1px solid #374151;
    cursor:pointer;
    position:relative;
}

.ticket:hover { background:#374151; }
.active-ticket { background:#2563eb; }

.unread {
    position:absolute;
    right:10px;
    top:10px;
    background:red;
    color:white;
    font-size:10px;
    padding:2px 6px;
    border-radius:10px;
}

.main {
    flex:1;
    display:flex;
    flex-direction:column;
}

.header {
    padding:15px;
    background:white;
    border-bottom:1px solid #ddd;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.messages {
    flex:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.bubble {
    max-width:65%;
    padding:12px;
    margin:6px 0;
    border-radius:10px;
}

.user { background:#e0f2fe; }
.admin { background:#dcfce7; align-self:flex-end; }

.time {
    font-size:10px;
    opacity:0.6;
}

.bubble img, .bubble video {
    max-width:250px;
    border-radius:8px;
    margin-top:5px;
}

.input-box {
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
}

input {
    flex:1;
    padding:10px;
}

.send {
    margin-left:10px;
    background:#2563eb;
    color:white;
}

.controls {
    display:flex;
    gap:10px;
}

button {
    cursor:pointer;
    padding:6px 10px;
    border:none;
    border-radius:6px;
}
.close { background:#ef4444; color:white; }
.open { background:#22c55e; color:white; }
.upload { background:#2563eb; color:white; }
</style>
</head>

<body>

<div class="nav">💬</div>

<div class="sidebar">

<div class="search">
<input id="search" placeholder="Search..." oninput="filterTickets()">
</div>

<div id="ticketList" class="ticket-list">
{% for t in tickets %}
<div class="ticket" data-id="{{t[0]}}">
<b>{{t[2]}}</b><br>
<small>{{t[1]}}</small><br>
<small>Status: {{t[4]}}</small>
</div>
{% endfor %}
</div>

</div>

<div class="main">

<div class="header">
<div id="ticketTitle">Select a ticket</div>

<div class="controls">
<button class="open" onclick="openTicket()">Open</button>
<button class="close" onclick="closeTicket()">Close</button>
<button class="upload" onclick="uploadFile()">📎</button>
<input type="file" id="fileInput" hidden>
</div>

</div>

<div id="messages" class="messages"></div>

<div class="input-box">
<input id="messageInput" placeholder="Reply..." onkeypress="handleKey(event)">
<button class="send" onclick="sendReply()">Send</button>
</div>

</div>

<script>
let socket = io();
let currentTicket = null;
let currentStatus = "open";
let unreadMap = {};

const messagesEl = document.getElementById("messages");
const titleEl = document.getElementById("ticketTitle");
const inputEl = document.getElementById("messageInput");
const fileInput = document.getElementById("fileInput");

// 🔔 enable notifications
if ("Notification" in window) {
    Notification.requestPermission();
}

// 🔊 sound
let audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

// CLICK
document.querySelectorAll(".ticket").forEach(el=>{
    el.addEventListener("click", ()=>{
        loadTicket(el.dataset.id, el);
    });
});

// LOAD
function loadTicket(id, el){
    currentTicket = id;
    unreadMap[id] = 0;

    socket.emit("join_ticket", { ticket_id:id });

    document.querySelectorAll(".ticket").forEach(t=>t.classList.remove("active-ticket"));
    el.classList.add("active-ticket");

    let statusText = el.innerText.toLowerCase();
    currentStatus = statusText.includes("closed") ? "closed" : "open";

    titleEl.innerText = "Ticket: "+id+" ("+currentStatus+")";

    fetch(`/api/history/${id}`)
    .then(res=>res.json())
    .then(data=>{
        messagesEl.innerHTML="";
        data.forEach(m=>addMessage(m.message,m.sender,m.time));
    });

    updateUnreadUI(el, 0);
}

// ADD MESSAGE
function addMessage(msg,sender,time=""){
    let div=document.createElement("div");
    div.className="bubble "+sender;

    if(msg.startsWith("[FILE]")){
        let file = msg.replace("[FILE] ","");
        let url = "/uploads/" + file;
        let ext = file.split('.').pop().toLowerCase();

        if(["jpg","jpeg","png","gif","webp"].includes(ext)){
            div.innerHTML = `<img src="${url}">`;
        }
        else if(["mp4","webm","ogg"].includes(ext)){
            div.innerHTML = `<video controls><source src="${url}"></video>`;
        }
        else{
            div.innerHTML = `<a href="${url}" target="_blank">📎 ${file}</a>`;
        }

        div.innerHTML += `<br><a href="/download/${file}">⬇ Download</a>`;
    } else {
        div.innerText = msg;
    }

    div.innerHTML += `<div class="time">${time}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

// SEND
function sendReply(){
    if(currentStatus==="closed"){
        alert("Ticket is closed");
        return;
    }

    let msg=inputEl.value.trim();
    if(!msg || !currentTicket) return;

    socket.emit('send_message',{
        ticket_id:currentTicket,
        sender:'admin',
        message:msg
    });

    addMessage(msg,'admin');
    inputEl.value="";
}

// FILE
function uploadFile(){
    if(currentStatus==="closed"){
        alert("Ticket is closed");
        return;
    }
    fileInput.click();
}

fileInput.onchange = ()=>{
    let file = fileInput.files[0];
    if(!file) return;

    let form = new FormData();
    form.append("file", file);

    fetch(`/upload/${currentTicket}`,{
        method:"POST",
        body:form
    }).then(()=>{
        addMessage("[FILE] "+file.name,"admin");
    });
};

// CLOSE
function closeTicket(){
    fetch(`/close/${currentTicket}`).then(()=>{
        currentStatus="closed";
        titleEl.innerText="Ticket: "+currentTicket+" (closed)";
    });
}

// OPEN
function openTicket(){
    fetch(`/open/${currentTicket}`).then(()=>{
        currentStatus="open";
        titleEl.innerText="Ticket: "+currentTicket+" (open)";
    });
}

// SEARCH
function filterTickets(){
    let q=document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".ticket").forEach(t=>{
        t.style.display = t.innerText.toLowerCase().includes(q) ? "block":"none";
    });
}

// 🔴 UNREAD UI
function updateUnreadUI(el,count){
    let badge = el.querySelector(".unread");
    if(!badge){
        badge = document.createElement("div");
        badge.className="unread";
        el.appendChild(badge);
    }
    badge.innerText=count;
    badge.style.display = count>0 ? "block":"none";
}

// REALTIME
socket.on('new_message',data=>{
    let ticketEl = document.querySelector(`[data-id="${data.ticket_id}"]`);

    if(data.ticket_id===currentTicket){
        addMessage(data.message,data.sender,data.time);
    } else {
        unreadMap[data.ticket_id] = (unreadMap[data.ticket_id]||0)+1;
        if(ticketEl) updateUnreadUI(ticketEl, unreadMap[data.ticket_id]);

        // 🔔 notification
        if(Notification.permission==="granted"){
            new Notification("New Ticket Reply", { body:data.message });
        }

        audio.play();
    }
});

// ENTER
function handleKey(e){
    if(e.key==="Enter") sendReply();
}
</script>

</body>
</html>
