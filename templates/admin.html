<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

<style>
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    height:100vh;
    background:#f3f4f6;
}

/* NAV */
.nav {
    width:70px;
    background:#111827;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
}

/* SIDEBAR */
.sidebar {
    width:320px;
    background:#1f2937;
    color:white;
    display:flex;
    flex-direction:column;
}

.search { padding:10px; }
.search input {
    width:100%;
    padding:8px;
    border-radius:6px;
    border:none;
}

.filters {
    display:flex;
    justify-content:space-around;
    padding:5px;
}
.filter { cursor:pointer; padding:4px 8px; }
.active-filter { background:#2563eb; border-radius:5px; }

.ticket-list { overflow-y:auto; flex:1; }

.ticket {
    padding:12px;
    border-bottom:1px solid #374151;
    cursor:pointer;
}

.ticket:hover { background:#374151; }
.active-ticket { background:#2563eb; }

.status-badge {
    font-size:10px;
    padding:2px 6px;
    border-radius:4px;
    margin-left:6px;
}

.open-badge { background:#22c55e; }
.closed-badge { background:#ef4444; }

/* MAIN */
.main {
    flex:1;
    display:flex;
    flex-direction:column;
}

.header {
    padding:15px;
    background:white;
    border-bottom:1px solid #ddd;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button {
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.close { background:#ef4444; color:white; }
.open { background:#22c55e; color:white; }

/* Messages */
.messages {
    flex:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.bubble {
    max-width:65%;
    padding:12px;
    margin:6px 0;
    border-radius:10px;
}

.user { background:#e0f2fe; align-self:flex-start; }
.admin { background:#dcfce7; align-self:flex-end; }

.time {
    font-size:10px;
    opacity:0.6;
}

.input-box {
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
}

input {
    flex:1;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

.send {
    margin-left:10px;
    background:#2563eb;
    color:white;
}

/* MODAL */
.modal {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal img, .modal video {
    max-width:80%;
}
</style>
</head>

<body>

<div class="nav">💬</div>

<div class="sidebar">
<div class="search">
    <input id="search" placeholder="Search..." oninput="filterTickets()">
</div>

<div class="filters">
    <div class="filter active-filter" onclick="setFilter('all')">All</div>
    <div class="filter" onclick="setFilter('open')">Open</div>
    <div class="filter" onclick="setFilter('closed')">Closed</div>
</div>

<div id="ticketList" class="ticket-list">
{% for t in tickets %}
<div class="ticket" data-id="{{t[0]}}" data-status="{{t[4]}}" onclick="loadTicket('{{t[0]}}', this)">
    <b>{{t[2]}}</b>
    <span class="status-badge {{ 'open-badge' if t[4]=='open' else 'closed-badge' }}">
        {{t[4]}}
    </span>
    <br>
    <small>{{t[1]}}</small>
</div>
{% endfor %}
</div>
</div>

<div class="main">
<div class="header">
    <div id="ticketTitle">Select a ticket</div>
    <div>
        <button class="open" onclick="openTicket()">Reopen</button>
        <button class="close" onclick="closeTicket()">Close</button>
    </div>
</div>

<div id="messages" class="messages"></div>

<div class="input-box">
    <input id="message" placeholder="Reply..." onkeypress="handleKey(event)">
    <button class="send" onclick="sendReply()">Send</button>
</div>
</div>

<div id="modal" class="modal" onclick="closeModal()"></div>

<script>
var socket = io();
let currentTicket = null;

function loadTicket(id, el){
    currentTicket = id;
    document.querySelectorAll(".ticket").forEach(t=>t.classList.remove("active-ticket"));
    el.classList.add("active-ticket");

    fetch(`/api/history/${id}`)
    .then(res=>res.json())
    .then(data=>{
        messages.innerHTML="";
        ticketTitle.innerText="Ticket: "+id;

        data.forEach(m=>addMessage(m.message,m.sender,m.time));
    });
}

function addMessage(msg,sender,time=""){
    let div=document.createElement("div");
    div.className="bubble "+sender;
    div.innerHTML=msg+"<div class='time'>"+time+"</div>";
    messages.appendChild(div);
    messages.scrollTop=messages.scrollHeight;
}

function sendReply(){
    let msg=message.value;
    if(!msg||!currentTicket)return;

    socket.emit('send_message',{
        ticket_id:currentTicket,
        sender:'admin',
        message:msg
    });

    addMessage(msg,'admin');
    message.value="";
}

function closeTicket(){
    fetch(`/close/${currentTicket}`).then(()=>alert("Closed"));
}

function openTicket(){
    fetch(`/open/${currentTicket}`).then(()=>alert("Reopened"));
}

socket.on('new_message',data=>{
    if(data.ticket_id===currentTicket){
        addMessage(data.message,data.sender,data.time);
    }
});
</script>

</body>
</html>
