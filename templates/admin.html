<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

<style>
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    height:100vh;
    background:#f3f4f6;
}

/* NAV */
.nav {
    width:70px;
    background:#111827;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
}

/* SIDEBAR */
.sidebar {
    width:320px;
    background:#1f2937;
    color:white;
    display:flex;
    flex-direction:column;
}

.search { padding:10px; }
.search input {
    width:100%;
    padding:8px;
    border-radius:6px;
    border:none;
}

.filters {
    display:flex;
    justify-content:space-around;
    padding:5px;
}
.filter { cursor:pointer; padding:4px 8px; }
.active-filter { background:#2563eb; border-radius:5px; }

.ticket-list { overflow-y:auto; flex:1; }

.ticket {
    padding:12px;
    border-bottom:1px solid #374151;
    cursor:pointer;
}

.ticket:hover { background:#374151; }
.active-ticket { background:#2563eb; }

/* MAIN */
.main {
    flex:1;
    display:flex;
    flex-direction:column;
}

.header {
    padding:15px;
    background:white;
    border-bottom:1px solid #ddd;
    display:flex;
    justify-content:space-between;
}

.messages {
    flex:1;
    padding:20px;
    overflow-y:auto;
}

.bubble {
    max-width:65%;
    padding:12px;
    margin:6px 0;
    border-radius:10px;
}

.user { background:#e0f2fe; }
.admin { background:#dcfce7; align-self:flex-end; }

.time {
    font-size:10px;
    opacity:0.6;
}

.input-box {
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
}

input {
    flex:1;
    padding:10px;
}

.send {
    margin-left:10px;
    background:#2563eb;
    color:white;
}
</style>
</head>

<body>

<div class="nav">💬</div>

<div class="sidebar">

<div class="search">
    <input id="search" placeholder="Search..." oninput="filterTickets()">
</div>

<div class="filters">
    <div class="filter" onclick="setFilter('all')">All</div>
    <div class="filter" onclick="setFilter('open')">Open</div>
    <div class="filter" onclick="setFilter('closed')">Closed</div>
</div>

<div id="ticketList" class="ticket-list">
{% for t in tickets %}
<div class="ticket" data-id="{{t[0]}}" data-status="{{t[4]}}">
    <b>{{t[2]}}</b><br>
    <small>{{t[1]}}</small>
</div>
{% endfor %}
</div>

</div>

<div class="main">

<div class="header">
    <div id="ticketTitle">Select a ticket</div>
</div>

<div id="messages" class="messages"></div>

<div class="input-box">
    <input id="messageInput" placeholder="Reply..." onkeypress="handleKey(event)">
    <button class="send" onclick="sendReply()">Send</button>
</div>

</div>

<script>

// SAFE SOCKET
let socket;
try {
    socket = io();
} catch(e){
    console.log("Socket failed:", e);
}

let currentTicket = null;

const messagesEl = document.getElementById("messages");
const titleEl = document.getElementById("ticketTitle");
const inputEl = document.getElementById("messageInput");

// 🔥 FIX: attach click AFTER render
document.querySelectorAll(".ticket").forEach(el=>{
    el.addEventListener("click", ()=>{
        loadTicket(el.dataset.id, el);
    });
});

// LOAD TICKET
function loadTicket(id, el){
    currentTicket = id;

    document.querySelectorAll(".ticket").forEach(t=>t.classList.remove("active-ticket"));
    el.classList.add("active-ticket");

    fetch(`/api/history/${id}`)
    .then(res=>{
        if(!res.ok){
            throw new Error("API failed");
        }
        return res.json();
    })
    .then(data=>{
        messagesEl.innerHTML="";
        titleEl.innerText="Ticket: "+id;

        if(!Array.isArray(data)){
            console.error("Bad data", data);
            return;
        }

        data.forEach(m=>addMessage(m.message,m.sender,m.time));
    })
    .catch(err=>{
        console.error("LOAD ERROR:", err);
        alert("Failed to load ticket (check backend)");
    });
}

// ADD MESSAGE
function addMessage(msg,sender,time=""){
    let div=document.createElement("div");
    div.className="bubble "+sender;
    div.innerHTML=msg+"<div class='time'>"+time+"</div>";
    messagesEl.appendChild(div);
}

// SEND MESSAGE
function sendReply(){
    let msg=inputEl.value.trim();
    if(!msg || !currentTicket){
        alert("Select ticket first");
        return;
    }

    if(socket){
        socket.emit('send_message',{
            ticket_id:currentTicket,
            sender:'admin',
            message:msg
        });
    }

    addMessage(msg,'admin');
    inputEl.value="";
}

// SEARCH
function filterTickets(){
    let q=document.getElementById("search").value.toLowerCase();

    document.querySelectorAll(".ticket").forEach(t=>{
        t.style.display = t.innerText.toLowerCase().includes(q) ? "block":"none";
    });
}

// FILTER
function setFilter(status){
    document.querySelectorAll(".ticket").forEach(t=>{
        if(status==="all"){
            t.style.display="block";
        } else {
            t.style.display = t.dataset.status===status ? "block":"none";
        }
    });
}

// REALTIME
if(socket){
    socket.on('new_message',data=>{
        if(data.ticket_id===currentTicket){
            addMessage(data.message,data.sender,data.time);
        }
    });
}

// ENTER
function handleKey(e){
    if(e.key==="Enter") sendReply();
}
</script>

</body>
</html>
