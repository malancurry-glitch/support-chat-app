<!DOCTYPE html>
<html>
<head>
<title>My Tickets</title>

<style>
body {
    font-family:sans-serif;
    background:#f3f4f6;
    margin:0;
}

.container {
    max-width:600px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.ticket {
    padding:15px;
    border-bottom:1px solid #eee;
    cursor:pointer;
    transition:0.2s;
}

.ticket:hover {
    background:#f9fafb;
}

.status {
    font-size:12px;
    padding:2px 6px;
    border-radius:4px;
    margin-left:5px;
}

.open { background:#22c55e; color:white; }
.closed { background:#ef4444; color:white; }

.btn {
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    width:100%;
    cursor:pointer;
}

.empty {
    text-align:center;
    color:#666;
    margin-top:20px;
}

.divider {
    margin:20px 0;
    text-align:center;
    color:#999;
}
</style>

</head>

<body>

<div class="container">

<h3>Find Your Tickets</h3>

<!-- 🔥 EMAIL SEARCH (KEEP ORIGINAL) -->
<form method="POST">
    <input id="emailInput" name="email" placeholder="Enter your email" required style="width:100%;padding:10px;margin-bottom:10px;">
    <button class="btn">Search by Email</button>
</form>

<div class="divider">OR</div>

<!-- 🔥 NEW: TICKET ID + EMAIL SEARCH -->
<div>
    <input id="ticketIdInput" placeholder="Enter Ticket ID (#123456)" style="width:100%;padding:10px;margin-bottom:10px;">
    <input id="emailCheck" placeholder="Confirm Email" style="width:100%;padding:10px;margin-bottom:10px;">
    <button class="btn" onclick="checkTicket()">Check Ticket</button>
</div>

{% if tickets is not none %}
<hr>

{% if tickets|length == 0 %}
<div class="empty">
No tickets found for {{email}}
</div>
{% else %}

<h4>Tickets for {{email}}</h4>

{% for t in tickets %}
<div class="ticket" onclick="openTicket('{{t[0]}}')">
    <b>{{t[1]}}</b>
    <span class="status {{ 'open' if t[2]=='open' else 'closed' }}">
        {{t[2]}}
    </span>
    <br>
    <small>ID: #{{t[0]}}</small><br>
    <small>{{t[3]}}</small>
</div>
{% endfor %}

{% endif %}
{% endif %}

</div>

<script>
// 🔥 AUTO-FILL EMAIL
window.onload = () => {
    let saved = localStorage.getItem("user_email");
    if(saved){
        document.getElementById("emailInput").value = saved;
        document.getElementById("emailCheck").value = saved;
    }
};

// 🔥 SAVE EMAIL
document.querySelector("form").addEventListener("submit", ()=>{
    let email = document.getElementById("emailInput").value;
    localStorage.setItem("user_email", email);
});

// 🔥 OPEN TICKET
function openTicket(id){
    window.location.href = "/ticket/" + id;
}

// 🔥 NEW: CHECK BY ID + EMAIL
function checkTicket(){
    let id = document.getElementById("ticketIdInput").value.replace("#","");
    let email = document.getElementById("emailCheck").value;

    if(!id || !email){
        alert("Enter Ticket ID and Email");
        return;
    }

    // 🔥 simple redirect (backend validates)
    window.location.href = `/ticket/${id}?email=${encodeURIComponent(email)}`;
}
</script>

</body>
</html>
