<!DOCTYPE html>
<html>
<head>
<title>Ticket</title>
<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

<style>
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#eef2ff;
}

.container {
    max-width:900px;
    margin:20px auto;
    background:white;
    border-radius:16px;
    display:flex;
    flex-direction:column;
    height:92vh;
    box-shadow:0 20px 60px rgba(0,0,0,0.12);
}

.header {
    padding:14px;
    background:#2563eb;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header-left {
    display:flex;
    align-items:center;
    gap:10px;
}

.back {
    cursor:pointer;
    background:white;
    color:#2563eb;
    padding:4px 10px;
    border-radius:6px;
    font-size:13px;
}

.status {
    font-size:12px;
    background:#22c55e;
    padding:3px 8px;
    border-radius:20px;
}

.messages {
    flex:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:12px;
    background:#f8fafc;
}

.msg-row {
    display:flex;
    gap:10px;
}

.avatar {
    width:34px;
    height:34px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    font-weight:bold;
}

.user-avatar {
    background:#2563eb;
    color:white;
}

.admin-avatar {
    background:#e5e7eb;
}

.bubble {
    max-width:70%;
    padding:12px;
    border-radius:14px;
    font-size:14px;
}

.user {
    background:#2563eb;
    color:white;
    margin-left:auto;
}

.admin {
    background:#e5e7eb;
}

.bubble img, .bubble video {
    max-width:260px;
    border-radius:10px;
    margin-top:6px;
}

.time {
    font-size:10px;
    opacity:0.6;
    margin-top:4px;
}

.status-check {
    font-size:10px;
    margin-left:6px;
}

.input-box {
    display:flex;
    padding:12px;
    border-top:1px solid #eee;
    background:white;
}

input {
    flex:1;
    padding:12px;
    border-radius:20px;
    border:1px solid #ddd;
    outline:none;
}

button {
    margin-left:6px;
    padding:10px;
    border:none;
    border-radius:50%;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.typing {
    font-size:12px;
    color:#6b7280;
    padding-left:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <div class="header-left">
        <div class="back" onclick="goBack()">← Back</div>
        <div><b>Ticket #{{ticket_id}}</b></div>
    </div>
    <div class="status">● Online</div>
</div>

<div id="messages" class="messages">

{% for msg in messages %}
<div class="msg-row">

{% if msg[0] == 'admin' %}
<div class="avatar admin-avatar">S</div>
{% endif %}

<div class="bubble {{msg[0]}}">
{{msg[1]}}
<div class="time">{{msg[2]}}</div>
</div>

{% if msg[0] == 'user' %}
<div class="avatar user-avatar">U</div>
{% endif %}

</div>
{% endfor %}

</div>

<div id="typing" class="typing"></div>

<div class="input-box">
<input id="messageInput" placeholder="Type a message...">
<input type="file" id="fileInput" hidden>
<button onclick="upload()">📎</button>
<button onclick="sendMessage()">➤</button>
</div>

</div>

<script>
var socket = io(location.origin);
var ticket_id = "{{ticket_id}}";

const box = document.getElementById("messages");
const input = document.getElementById("messageInput");
const fileInput = document.getElementById("fileInput");
const typingEl = document.getElementById("typing");

let unread = 0;

socket.emit("join_ticket", { ticket_id });

if ("Notification" in window) {
    Notification.requestPermission();
}

function goBack(){
    window.location.href = "/my-tickets";
}

function scrollDown(){
    box.scrollTop = box.scrollHeight;
}
scrollDown();

function addMessage(msg, sender, time=""){
    let row = document.createElement("div");
    row.className = "msg-row";

    let avatar = document.createElement("div");
    avatar.className = "avatar " + (sender==="user" ? "user-avatar":"admin-avatar");
    avatar.innerText = sender==="user" ? "U":"S";

    let bubble = document.createElement("div");
    bubble.className = "bubble " + sender;

    bubble.innerText = msg;

    // ✓ indicator (safe UI only)
    let check = sender==="user" ? "✓" : "";

    bubble.innerHTML += `<div class="time">${time} <span class="status-check">${check}</span></div>`;

    if(sender==="user"){
        row.appendChild(bubble);
        row.appendChild(avatar);
    } else {
        row.appendChild(avatar);
        row.appendChild(bubble);
    }

    box.appendChild(row);
    scrollDown();
}

function sendMessage(){
    let msg = input.value.trim();
    if(!msg) return;

    socket.emit('send_message',{
        ticket_id,
        sender:'user',
        message:msg
    });

    addMessage(msg,"user",new Date().toLocaleTimeString());
    input.value="";
}

function upload(){
    fileInput.click();
}

fileInput.onchange = ()=>{
    let file = fileInput.files[0];
    if(!file) return;

    let form = new FormData();
    form.append("file", file);

    fetch(`/upload/${ticket_id}`,{
        method:"POST",
        body:form
    }).then(()=>{
        addMessage("[FILE] "+file.name,"user",new Date().toLocaleTimeString());
    });
};

socket.on('new_message', data=>{
    if(String(data.ticket_id) === String(ticket_id)){
        addMessage(data.message,data.sender,data.time);

        // notification
        if(data.sender==="admin" && document.hidden){
            new Notification("New reply", { body:data.message });
            unread++;
            document.title = "(" + unread + ") Ticket";
        }
    }
});

// typing (safe UI only)
input.addEventListener("input",()=>{
    typingEl.innerText="Typing...";
    setTimeout(()=>typingEl.innerText="",1000);
});

window.onfocus = ()=>{
    unread=0;
    document.title="Ticket";
};

input.addEventListener("keypress", e=>{
    if(e.key==="Enter"){
        e.preventDefault();
        sendMessage();
    }
});
</script>

</body>
</html>
