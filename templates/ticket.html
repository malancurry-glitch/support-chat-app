<!DOCTYPE html>
<html>
<head>
<title>Ticket</title>
<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

<style>
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
}

/* Layout */
.container {
    max-width:800px;
    margin:20px auto;
    background:white;
    border-radius:16px;
    display:flex;
    flex-direction:column;
    height:90vh;
    box-shadow:0 15px 50px rgba(0,0,0,0.12);
    overflow:hidden;
}

/* Header */
.header {
    padding:12px;
    background:#2563eb;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header-left {
    display:flex;
    align-items:center;
    gap:10px;
}

.back {
    cursor:pointer;
    font-size:14px;
    background:white;
    color:#2563eb;
    padding:4px 8px;
    border-radius:6px;
}

.actions {
    display:flex;
    gap:6px;
}

.actions button {
    background:white;
    color:#2563eb;
    border-radius:6px;
    padding:5px 8px;
}

/* Messages */
.messages {
    flex:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:8px;
    background:#f9fafb;
}

/* Bubble */
.bubble {
    max-width:70%;
    padding:12px;
    border-radius:14px;
    font-size:14px;
}

.user {
    background:#2563eb;
    color:white;
    align-self:flex-end;
}

.admin {
    background:#e5e7eb;
    align-self:flex-start;
}

.time {
    font-size:10px;
    opacity:0.6;
    margin-top:4px;
}

/* Input */
.input-box {
    display:flex;
    padding:10px;
    border-top:1px solid #eee;
}

input {
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ddd;
}

button {
    margin-left:6px;
    padding:10px;
    border:none;
    border-radius:50%;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">

<div class="header-left">
    <div class="back" onclick="goBack()">← Back</div>
    <div><b id="ticketLabel">Ticket #{{ticket_id}}</b></div>
</div>

<div class="actions">
    <button onclick="copyTicket()">Copy</button>
    <button onclick="reloadChat()">↻</button>
</div>

</div>

<!-- MESSAGES -->
<div id="messages" class="messages">
{% for msg in messages %}
<div class="bubble {{msg[0]}}">
    {{msg[1]}}
    <div class="time">{{msg[2]}}</div>
</div>
{% endfor %}
</div>

<div id="typing" style="padding-left:10px;font-size:12px;"></div>

<!-- INPUT -->
<div class="input-box">
    <input id="messageInput" placeholder="Type a message...">
    <input type="file" id="fileInput" hidden>
    <button onclick="upload()">📎</button>
    <button onclick="sendMessage()">➤</button>
</div>

</div>

<script>
var socket = io(location.origin);
var ticket_id = "{{ticket_id}}";

const box = document.getElementById("messages");
const input = document.getElementById("messageInput");
const fileInput = document.getElementById("fileInput");
const typingEl = document.getElementById("typing");

// BACK BUTTON
function goBack(){
    window.location.href = "/my-tickets";
}

// COPY TICKET ID
function copyTicket(){
    navigator.clipboard.writeText(ticket_id);
    alert("Copied!");
}

// RELOAD CHAT
function reloadChat(){
    fetch(`/api/history/${ticket_id}`)
    .then(res=>res.json())
    .then(data=>{
        box.innerHTML="";
        data.forEach(m=>addMessage(m.message,m.sender,m.time));
    });
}

// SCROLL
function scrollDown(){
    box.scrollTop = box.scrollHeight;
}
scrollDown();

// ADD MESSAGE
function addMessage(msg, sender, time=""){
    let div = document.createElement("div");
    div.className = "bubble " + sender;
    div.innerHTML = msg + `<div class="time">${time}</div>`;
    box.appendChild(div);
    scrollDown();
}

// SEND
function sendMessage(){
    let msg = input.value.trim();
    if(!msg) return;

    socket.emit('send_message',{
        ticket_id,
        sender:'user',
        message:msg
    });

    addMessage(msg,"user",new Date().toLocaleTimeString());
    input.value="";
}

// FILE
function upload(){
    fileInput.click();
}

fileInput.onchange = ()=>{
    let file = fileInput.files[0];
    if(!file) return;

    let form = new FormData();
    form.append("file", file);

    fetch(`/upload/${ticket_id}`,{
        method:"POST",
        body:form
    }).then(()=>{
        addMessage("[FILE] "+file.name,"user");
    });
};

// RECEIVE
socket.on('new_message', data=>{
    if(data.ticket_id===ticket_id){
        addMessage(data.message,data.sender,data.time);
    }
});

// TYPING
input.addEventListener("input",()=>{
    socket.emit('typing',{});
});

socket.on('typing',()=>{
    typingEl.innerText="Support typing...";
    setTimeout(()=>typingEl.innerText="",1500);
});

// ENTER SEND
input.addEventListener("keypress", e=>{
    if(e.key==="Enter"){
        e.preventDefault();
        sendMessage();
    }
});
</script>

</body>
</html>
