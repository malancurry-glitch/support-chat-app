<!DOCTYPE html>
<html>
<head>
<title>Ticket</title>
<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

<style>
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#eef2ff; }

.container { max-width:900px; margin:20px auto; background:white; border-radius:16px; display:flex; flex-direction:column; height:92vh; box-shadow:0 20px 60px rgba(0,0,0,0.12); }

.header { padding:14px; background:#2563eb; color:white; display:flex; justify-content:space-between; align-items:center; }

.header-left { display:flex; align-items:center; gap:10px; }

.back { cursor:pointer; background:white; color:#2563eb; padding:4px 10px; border-radius:6px; font-size:13px; }

.status { font-size:12px; background:#22c55e; padding:3px 8px; border-radius:20px; }

.messages { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; background:#f8fafc; }

.msg-row { display:flex; gap:10px; }

.avatar {
    width:34px;
    height:34px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    font-weight:bold;
}

.user-avatar { background:#2563eb; color:white; }
.admin-avatar { background:#e5e7eb; }

.bubble {
    max-width:70%;
    padding:12px;
    border-radius:14px;
    font-size:14px;
}

.user { background:#2563eb; color:white; margin-left:auto; }
.admin { background:#e5e7eb; }

.system {
    text-align:center;
    font-size:12px;
    color:#6b7280;
}

.time { font-size:10px; opacity:0.6; margin-top:4px; }

.input-box { display:flex; padding:12px; border-top:1px solid #eee; }

input { flex:1; padding:12px; border-radius:20px; border:1px solid #ddd; }

button { margin-left:6px; padding:10px; border:none; border-radius:50%; background:#2563eb; color:white; cursor:pointer; }

.typing { font-size:12px; color:#6b7280; padding-left:10px; }

.sla {
    font-size:11px;
    background:#fef3c7;
    padding:3px 6px;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <div class="header-left">
        <div class="back" onclick="goBack()">← Back</div>
        <div>
            <b>Ticket #{{ticket_id}}</b><br>
            <span class="sla" id="slaTimer"></span>
        </div>
    </div>
    <div class="status" id="agentStatus">● Waiting...</div>
</div>

<div id="messages" class="messages"></div>
<div id="typing" class="typing"></div>

<div class="input-box">
    <input id="messageInput" placeholder="Type a message...">
    <input type="file" id="fileInput" hidden>
    <button onclick="upload()">📎</button>
    <button onclick="sendMessage()">➤</button>
</div>

</div>

<script>
var socket = io(location.origin);
var ticket_id = "{{ticket_id}}";

const box = document.getElementById("messages");
const typingEl = document.getElementById("typing");
const agentStatus = document.getElementById("agentStatus");
const slaTimer = document.getElementById("slaTimer");

let assignedAgent = null;

// JOIN ROOM
socket.emit("join_ticket", { ticket_id });

// SLA TIMER
let start = Date.now();
setInterval(()=>{
    let diff = 300000 - (Date.now()-start);
    if(diff < 0) diff = 0;
    slaTimer.innerText = "Response SLA: " + Math.floor(diff/1000) + "s";
},1000);

// SYSTEM MESSAGE
function system(msg){
    let div=document.createElement("div");
    div.className="system";
    div.innerHTML=msg;
    box.appendChild(div);
    scroll();
}

// ADD MESSAGE
function addMessage(msg,sender,time="",agent="Agent"){
    let row=document.createElement("div");
    row.className="msg-row";

    let avatar=document.createElement("div");
    avatar.className="avatar " + (sender==="user"?"user-avatar":"admin-avatar");
    avatar.innerText = sender==="user" ? "U" : (agent ? agent[0].toUpperCase() : "A");

    let bubble=document.createElement("div");
    bubble.className="bubble "+sender;

    bubble.innerText = msg;
    bubble.innerHTML += `<div class="time">${time}</div>`;

    if(sender==="user"){
        row.appendChild(bubble);
        row.appendChild(avatar);
    } else {
        row.appendChild(avatar);
        row.appendChild(bubble);
    }

    box.appendChild(row);
    scroll();
}

// SCROLL
function scroll(){ box.scrollTop = box.scrollHeight; }

// LOAD HISTORY
fetch(`/api/history/${ticket_id}`)
.then(res=>res.json())
.then(data=>{
    data.forEach(m=>{
        addMessage(m.message,m.sender,m.time,m.agent);
    });
});

// SEND
function sendMessage(){
    let msg = messageInput.value.trim();
    if(!msg) return;

    socket.emit("send_message",{ticket_id,sender:"user",message:msg});
    addMessage(msg,"user",new Date().toLocaleTimeString());
    messageInput.value="";
}

// FILE
function upload(){ fileInput.click(); }

fileInput.onchange=()=>{
    let file=fileInput.files[0];
    let form=new FormData();
    form.append("file",file);

    fetch(`/upload/${ticket_id}`,{method:"POST",body:form})
    .then(()=>addMessage("[FILE] "+file.name,"user"));
};

// REALTIME MESSAGE
socket.on("new_message",data=>{
    if(data.ticket_id==ticket_id){
        addMessage(data.message,data.sender,data.time,data.agent);
    }
});

// ASSIGNED
socket.on("assigned", data=>{
    if(data.ticket_id == ticket_id){
        assignedAgent = data.agent;
        system(`<b>${assignedAgent}</b> is now handling your ticket`);
        agentStatus.innerText = "● Assigned to " + assignedAgent;
    }
});

// TRANSFERRING
socket.on("agent_transferring", data=>{
    if(data.ticket_id == ticket_id){
        system(`🔁 <b>${data.from}</b> is transferring your chat...`);
        agentStatus.innerText = "● Transferring...";
    }
});

// TRANSFER COMPLETE
socket.on("agent_transfer",data=>{
    if(data.ticket_id == ticket_id){
        assignedAgent = data.to;
        system(`🔁 Chat transferred to <b>${data.to}</b>`);
        agentStatus.innerText = "● Assigned to " + data.to;
    }
});

// TYPING
socket.on("typing",data=>{
    if(data.agent === assignedAgent){
        typingEl.innerText = data.agent + " is typing...";
        setTimeout(()=>typingEl.innerText="",1000);
    }
});

// BACK
function goBack(){
    window.location.href="/my-tickets";
}

// INIT
window.onload=()=>{
    system("One of our Customer Support agents will be with you soon.");
};
</script>

</body>
</html>
